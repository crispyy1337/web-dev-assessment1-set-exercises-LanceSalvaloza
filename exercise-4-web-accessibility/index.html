<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Wondering Photographer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="exercise-4-styles.css">
</head>

<body>
    <header>
        <img src="TheDivider.png" alt="" class="divider" aria-hidden="true">

        <h1>The Wondering Photographer</h1>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">About me</a></li>
            </ul>
        </nav>

        <button class="cart-button" aria-label="View shopping basket">
            <img src="shopping.svg" alt="" aria-hidden="true">
            <span>Basket</span>
        </button>
    </header>

    <main>
        <section aria-labelledby="gallery-heading">
            <h2 id="gallery-heading">Travel Photography Prints</h2>

            <figure>
                <img src="OceanPhoto.jpg" alt="Calm blue ocean along the coast of Greenland at sunset">
                <figcaption>
                    <p>This was from a fabulous trip to the coast of Greenland with my family. The water was lovely—but
                        very cold!</p>
                    <button aria-label="Add Greenland coast photo to basket">
                        Add to basket
                    </button>
                </figcaption>
            </figure>

            <figure>
                <img src="BridgePhoto.jpg" alt="View looking up at the Golden Gate Bridge in San Francisco">
                <figcaption>
                    <p>A picture of the Golden Gate Bridge in San Francisco.</p>
                    <button aria-label="Add Golden Gate Bridge photo to basket">
                        Add to basket
                    </button>
                </figcaption>
            </figure>

            <figure>
                <img src="ValleyPhoto.jpg" alt="Wide river valley in Greenland surrounded by mountains">
                <figcaption>
                    <p>Another great photo from Greenland. It's a river valley where a glacier used to be.</p>
                    <button aria-label="Add Greenland valley photo to basket">
                        Add to basket
                    </button>
                </figcaption>
            </figure>

            <figure>
                <img src="WaterfallPhoto.jpg" alt="Waterfall cascading into a pool surrounded by green landscape">
                <figcaption>
                    <p>The waterfall made such a lovely sound. I could have fallen asleep!</p>
                    <button aria-label="Add waterfall photo to basket">
                        Add to basket
                    </button>
                </figcaption>
            </figure>

        </section>
    </main>

    <footer>
        <p>© The Wondering Photographer 2018</p>
    </footer>
</body>

</html>
